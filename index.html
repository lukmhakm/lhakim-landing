<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakim | Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
            color: #aeaeae;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        p {
            font-size: 1rem;
            color: #888888;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: #cccccc;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #444444;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">LHKIM</div>
        <h1>Something creative is in the making.</h1>
        <p>Website lagi disiapin biar rapi. Butuh jasa graphic design atau video editing sekarang? Langsung kontak gw via email di bawah ya.</p>
        
        <a href="mailto:hello@lhakim.my.id" class="cta-button">Say Hello</a>

        <div class="footer">
            &copy; 2026 lhakim.my.id. All rights reserved.
        </div>
    </div>

</body>
</html>
